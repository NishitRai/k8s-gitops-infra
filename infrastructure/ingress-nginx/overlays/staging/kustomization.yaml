apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Inject staging-specific adjustments directly into the Helm chart
helmCharts:
  - name: ingress-nginx
    repo: https://kubernetes.github.io/ingress-nginx
    version: 4.10.0
    releaseName: ingress-nginx
    namespace: ingress-nginx
    valuesInline:
      controller:
        replicaCount: 1  
        service:
          annotations:
            # Allocate an external IP from the staging pool!
            metallb.universe.tf/address-pool: staging-pool
