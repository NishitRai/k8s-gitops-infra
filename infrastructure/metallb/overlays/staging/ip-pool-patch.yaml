apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: staging-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.70-192.168.1.80 
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: staging-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
    - staging-pool
