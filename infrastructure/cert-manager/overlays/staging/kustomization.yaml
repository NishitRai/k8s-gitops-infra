apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - cluster-issuer.yaml

helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    version: v1.20.3
    releaseName: cert-manager
    namespace: cert-manager
    valuesInline:
      installCRDs: true
  - name: cert-manager-webhook-desec
    repo: https://github.io
    version: v0.1.5 
    releaseName: cert-manager-webhook-desec
    namespace: cert-manager
