apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml

helmCharts:
  - name: podinfo
    repo: https://stefanprodan.github.io/podinfo
    version: 6.6.0
    releaseName: podinfo
    namespace: podinfo
    valuesInline:
      ui:
        message: "Welcome to Staging GitOps!"
        color: "#3457D5" # Staging Blue
      replicaCount: 1
