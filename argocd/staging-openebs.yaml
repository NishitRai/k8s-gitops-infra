apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-openebs-staging
  namespace: argocd
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: default
  source:
    repoURL: 'https://github.com/NishitRai/k8s-gitops-infra.git'
    targetRevision: HEAD
    path: infrastructure/openebs/staging
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: openebs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
